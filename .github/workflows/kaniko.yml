name: Kaniko build and push docker image

on:
  workflow_call:
    inputs:
      dockerfile:
        required: false
        type: string
        default: './Dockerfile'
      build_args:
        required: false
        type: string
        default: ' '
      push:
        required: false
        type: boolean
        default: false
      ecr_repo_url:
        required: true
        type: string
    secrets:
      build_args_secrets:
        required: false

jobs:
  kaniko:
    runs-on: [rts-dind]
    container: gcr.io/kaniko-project/executor:v1.23.0-debug
    permissions:
      contents: read
    steps:
      - name: "Build and push: ${{ inputs.push }}"
        run: |
          if [ ${{ inputs.push }} = false ];then
            push_image='--no-push'
          else
            push_image='--push-retry 3'
          fi

          github_short_sha=$(echo ${{ github.sha }} | cut -c1-8)
          build_args_all="${{ inputs.build_args}} ${{ secrets.build_args_secrets }}"

          /kaniko/executor --dockerfile=${{ inputs.dockerfile }} \
          --context="${{ github.repositoryUrl }}#${{ github.ref }}#${{ github.sha }}" \
          --destination=${{ inputs.ecr_repo_url }}:${github_short_sha} \
          ${push_image} \
          ${build_args_all} \
          && if [ ${{ inputs.push }} = true ];then echo "Docker image pushed to ${{ inputs.ecr_repo_url }}:${github_short_sha} :saluting_face:" >> $GITHUB_STEP_SUMMARY;fi
        env:
          GIT_USERNAME: ${{ github.actor }}
          GIT_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
